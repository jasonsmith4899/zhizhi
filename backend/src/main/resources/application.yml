server:
  port: 8080

spring:
  application:
    name: zhizhi-ai

  # ==================== 数据库 ====================
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zhizhi}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ==================== Spring AI - DeepSeek (OpenAI兼容) ====================
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 2000

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        table-name: vector_chunks
        initialize-schema: false

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: "never"

  # ==================== 缓存 ====================
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30m

  # ==================== 文件上传 ====================
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  # ==================== 微信小程序 ====================
  wechat:
    mini-program:
      default-appid: ${WECHAT_APPID:}
      default-secret: ${WECHAT_SECRET:}

# ==================== 应用配置 ====================
app:
  jwt:
    secret: ${JWT_SECRET:zhizhi-ai-knowledge-base-jwt-secret-key-2026}
    expiration: 7200000         # 2小时 (access token)
    refresh-expiration: 604800000  # 7天 (refresh token)

  ai:
    max-context-messages: 10
    max-context-tokens: 4000
    chunk-size: 500
    chunk-overlap: 100
    similarity-top-k: 5
    similarity-threshold: 0.7
    enable-hybrid: true
    hybrid-keyword-ratio: 0.5
    hybrid-rff-k: 60
    recall-min-score: 0.5
    recall-min-chunks: 1
    # Reranker 配置
    reranker:
      enabled: true
      model: BAAI/bge-reranker-v2-m3
      base-url: https://api.siliconflow.cn
    # KAG 轻量知识图谱配置
    kag:
      enabled: true
      extract-confidence-threshold: 0.6   # 三元组入库的最低置信度
      max-hops: 2                          # 子图遍历最大跳数
      max-subgraph-triples: 30            # 单次召回的最大三元组数
      max-extract-chars: 6000             # 单文档抽取的最大字符数

  quota:
    free:
      max-documents: 10
      max-daily-queries: 100
    basic:
      max-documents: 100
      max-daily-queries: 1000

  tenant:
    default-max-documents: 10
    default-max-daily-queries: 100

# ==================== 日志 ====================
logging:
  level:
    root: INFO
    com.zhizhi.ai: DEBUG
    org.springframework.ai: INFO
