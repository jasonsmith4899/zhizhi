version: '3.8'

services:
  # ==================== 后端应用 ====================
  backend:
    build: ./backend
    container_name: zhizhi-backend
    ports:
      - "8080:8080"
    environment:
      # 数据库 (连接已有的zhizhi-postgres)
      DB_HOST: zhizhi-postgres
      DB_PORT: 5432
      DB_NAME: zhizhi
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      # DeepSeek Chat API
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      # SiliconFlow API (Embedding + Reranker)
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-https://api.siliconflow.cn}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # 微信小程序
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # JVM
      JAVA_OPTS: "-Xms256m -Xmx512m"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==================== 前端 (Nginx) ====================
  frontend:
    build: ./frontend
    container_name: zhizhi-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
