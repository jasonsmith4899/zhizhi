version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhizhi-postgres
    environment:
      POSTGRES_DB: zhizhi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: zhizhi-backend
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zhizhi
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-https://api.siliconflow.cn}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      JWT_SECRET: ${JWT_SECRET}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: zhizhi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
